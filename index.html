<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SplitKita</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SplitKita" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #4ade80;
      --accent-dim: rgba(74,222,128,0.12);
      --danger: #f87171;
      --danger-dim: rgba(248,113,113,0.12);
      --warn: #fbbf24;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 14px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* ─── HEADER ─── */
    .app-header {
      padding: 20px 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .app-logo { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
    .app-logo span { color: var(--accent); }
    .btn-icon {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 38px; height: 38px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* ─── VIEWS ─── */
    .view { display: none; padding: 0 16px; }
    .view.active { display: block; }

    /* ─── SESSION LIST ─── */
    .section-title {
      font-size: 12px; font-weight: 600;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.8px; margin: 24px 0 10px;
    }
    .session-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .session-card:active { border-color: var(--accent); }
    .session-card-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .session-card-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; }
    .session-card-meta span { display: flex; align-items: center; gap: 4px; }
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 14px; line-height: 1.7;
    }
    .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

    /* ─── FAB ─── */
    .fab {
      position: fixed; bottom: 24px; right: 50%;
      transform: translateX(50%);
      max-width: calc(480px - 32px); width: calc(100% - 32px);
      background: var(--accent);
      color: #000; font-weight: 700; font-size: 15px;
      border: none; border-radius: 50px;
      padding: 16px 24px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 24px rgba(74,222,128,0.25);
      transition: opacity 0.15s;
    }
    .fab:active { opacity: 0.85; }

    /* ─── MODAL ─── */
    .modal-overlay {
      display: none; position: fixed;
      inset: 0; background: rgba(0,0,0,0.7);
      z-index: 100; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 40px;
      width: 100%; max-width: 480px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
    .modal-handle {
      width: 40px; height: 4px;
      background: var(--border); border-radius: 99px;
      margin: 0 auto 20px;
    }

    /* ─── FORM ─── */
    label { font-size: 12px; font-weight: 600; color: var(--muted); display: block; margin-bottom: 6px; }
    input, select {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text); font-family: inherit;
      font-size: 15px; padding: 12px 14px;
      outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    .form-group { margin-bottom: 16px; }
    .btn {
      width: 100%; background: var(--accent);
      color: #000; font-weight: 700;
      font-size: 15px; border: none;
      border-radius: var(--radius-sm);
      padding: 14px; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.85; }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ─── SESSION DETAIL ─── */
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--accent);
      background: none; border: none;
      cursor: pointer; padding: 20px 0 4px;
      font-family: inherit;
    }
    .session-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .session-subtitle { font-size: 13px; color: var(--muted); }

    /* SUMMARY CARD */
    .summary-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px; margin: 16px 0;
    }
    .summary-total {
      font-size: 28px; font-weight: 700;
      color: var(--accent); margin-bottom: 4px;
    }
    .summary-label { font-size: 12px; color: var(--muted); }
    .summary-members {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px;
    }
    .member-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px; padding: 4px 12px;
      font-size: 12px; font-weight: 500;
    }

    /* MEMBER BALANCES */
    .balance-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex; align-items: center;
      justify-content: space-between;
    }
    .balance-name { font-size: 14px; font-weight: 600; }
    .balance-paid { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .balance-net {
      font-size: 14px; font-weight: 700; text-align: right;
    }
    .balance-net.positive { color: var(--accent); }
    .balance-net.negative { color: var(--danger); }
    .balance-net.zero { color: var(--muted); }

    /* TRANSFER INSTRUCTIONS */
    .transfer-card {
      background: var(--accent-dim);
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 8px;
    }
    .transfer-text { font-size: 14px; font-weight: 500; }
    .transfer-amount { font-size: 18px; font-weight: 700; color: var(--accent); margin-top: 4px; }
    .transfer-arrow { color: var(--muted); }

    /* EXPENSE LIST */
    .expense-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 8px;
    }
    .expense-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .expense-desc { font-size: 14px; font-weight: 600; }
    .expense-amount { font-size: 15px; font-weight: 700; color: var(--accent); }
    .expense-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .expense-participants {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px;
    }
    .participant-chip {
      background: var(--surface2);
      border-radius: 99px; padding: 2px 8px;
      font-size: 11px; color: var(--muted);
    }
    .expense-delete {
      background: none; border: none;
      color: var(--danger); font-size: 16px;
      cursor: pointer; padding: 4px;
    }

    /* MEMBER INPUT LIST */
    .member-input-row {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 8px;
    }
    .member-input-row input { flex: 1; }
    .remove-member {
      background: var(--danger-dim);
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: var(--radius-sm);
      width: 38px; height: 38px; min-width: 38px;
      font-size: 18px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
    }
    .add-member-btn {
      width: 100%; background: var(--surface2);
      border: 1px dashed var(--border);
      color: var(--muted); border-radius: var(--radius-sm);
      padding: 10px; font-size: 13px;
      cursor: pointer; font-family: inherit;
      transition: border-color 0.15s;
    }
    .add-member-btn:active { border-color: var(--accent); }

    /* SPLIT TYPE TOGGLE */
    .split-toggle {
      display: flex; background: var(--surface2);
      border-radius: var(--radius-sm); padding: 4px; margin-bottom: 16px;
    }
    .split-toggle button {
      flex: 1; padding: 8px; border: none;
      border-radius: 6px; font-family: inherit;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      background: transparent; color: var(--muted);
    }
    .split-toggle button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* MEMBER CHECKBOX LIST */
    .member-check-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .member-check-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
      cursor: pointer; transition: border-color 0.15s;
    }
    .member-check-item.selected { border-color: var(--accent); }
    .member-check-item .check {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; transition: all 0.15s;
    }
    .member-check-item.selected .check {
      background: var(--accent); border-color: var(--accent); color: #000;
    }
    .member-check-item .name { font-size: 14px; font-weight: 500; flex: 1; }
    .member-check-item .custom-amount {
      width: 90px; display: none;
    }
    .member-check-item.selected.custom .custom-amount { display: block; }

    /* TABS */
    .tabs {
      display: flex; gap: 0; margin: 16px 0 0;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      font-size: 13px; font-weight: 500;
      color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; padding-top: 16px; }
    .tab-content.active { display: block; }

    /* LOADER */
    .loader {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--muted); gap: 8px; font-size: 14px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .badge {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      border-radius: 99px; padding: 2px 8px;
      font-size: 11px; font-weight: 600;
    }

    select option { background: #1a1a1a; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .toast {
      position: fixed; bottom: 100px; left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 10px 20px; font-size: 13px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 200; opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════
     VIEW: HOME
════════════════════════════════════ -->
<div class="view active" id="view-home">
  <div class="app-header">
    <div class="app-logo">Split<span>Kita</span></div>
  </div>
  <div style="padding: 0 16px;">
    <p class="section-title">Sesi Aktif</p>
    <div id="session-list">
      <div class="loader"><div class="spinner"></div> Memuat...</div>
    </div>
  </div>
  <button class="fab" onclick="openModal('modal-new-session')">
    <span>＋</span> Sesi Baru
  </button>
</div>

<!-- ═══════════════════════════════════
     VIEW: SESSION DETAIL
════════════════════════════════════ -->
<div class="view" id="view-detail">
  <div style="padding: 0 16px;">
    <button class="back-btn" onclick="goHome()">← Kembali</button>
    <div class="session-title" id="detail-title">—</div>
    <div class="session-subtitle" id="detail-subtitle">—</div>

    <div class="summary-row">
      <div class="summary-label">Total Belanja</div>
      <div class="summary-total" id="detail-total">Rp 0</div>
      <div class="summary-label" id="detail-per-orang" style="margin-top:4px;">— per orang</div>
      <div class="summary-members" id="detail-members"></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('tab-hasil')">Hasil</div>
      <div class="tab" onclick="switchTab('tab-pengeluaran')">Pengeluaran</div>
    </div>

    <!-- TAB: HASIL -->
    <div class="tab-content active" id="tab-hasil">
      <p class="section-title">Instruksi Transfer</p>
      <div id="transfer-list"></div>
      <p class="section-title">Saldo Per Orang</p>
      <div id="balance-list"></div>
    </div>

    <!-- TAB: PENGELUARAN -->
    <div class="tab-content" id="tab-pengeluaran">
      <div id="expense-list"></div>
      <div style="height:16px;"></div>
    </div>
  </div>

  <button class="fab" onclick="openModal('modal-add-expense')">
    <span>＋</span> Tambah Pengeluaran
  </button>
</div>

<!-- ═══════════════════════════════════
     MODAL: NEW SESSION
════════════════════════════════════ -->
<div class="modal-overlay" id="modal-new-session" onclick="closeModalOutside(event, 'modal-new-session')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Buat Sesi Baru</div>

    <div class="form-group">
      <label>Nama Sesi</label>
      <input type="text" id="new-session-name" placeholder="Belanja Bulanan, Liburan Bali..." />
    </div>

    <div class="form-group">
      <label>Anggota</label>
      <div id="member-inputs">
        <div class="member-input-row">
          <input type="text" placeholder="Nama orang 1" class="member-name-input" />
        </div>
        <div class="member-input-row">
          <input type="text" placeholder="Nama orang 2" class="member-name-input" />
        </div>
      </div>
      <button class="add-member-btn" onclick="addMemberInput()">＋ Tambah Orang</button>
    </div>

    <button class="btn" onclick="createSession()">Buat Sesi</button>
    <div style="height:10px;"></div>
    <button class="btn btn-ghost" onclick="closeModal('modal-new-session')">Batal</button>
  </div>
</div>

<!-- ═══════════════════════════════════
     MODAL: ADD EXPENSE
════════════════════════════════════ -->
<div class="modal-overlay" id="modal-add-expense" onclick="closeModalOutside(event, 'modal-add-expense')">
  <div class="modal" style="max-height:90dvh; overflow-y:auto;">
    <div class="modal-handle"></div>
    <div class="modal-title">Tambah Pengeluaran</div>

    <div class="form-group">
      <label>Deskripsi</label>
      <input type="text" id="exp-desc" placeholder="Belanja groceries, bensin..." />
    </div>

    <div class="form-group">
      <label>Total Bayar</label>
      <input type="number" id="exp-amount" placeholder="150000" inputmode="numeric" />
    </div>

    <div class="form-group">
      <label>Dibayar Oleh</label>
      <select id="exp-payer"></select>
    </div>

    <div class="form-group">
      <label>Peserta (yang ikut pakai)</label>
      <div class="split-toggle">
        <button class="active" id="toggle-equal" onclick="setSplitType('equal')">Rata</button>
        <button id="toggle-custom" onclick="setSplitType('custom')">Custom</button>
      </div>
      <div class="member-check-list" id="exp-participants"></div>
    </div>

    <div id="custom-total-warning" style="display:none; font-size:12px; color:var(--warn); margin-bottom:12px;"></div>

    <button class="btn" onclick="addExpense()">Simpan</button>
    <div style="height:10px;"></div>
    <button class="btn btn-ghost" onclick="closeModal('modal-add-expense')">Batal</button>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, getDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp, query, orderBy }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBILmwT_UrVuf0T2VCfVktNL8MhTjc9BhM",
    authDomain: "split-bill-e096b.firebaseapp.com",
    projectId: "split-bill-e096b",
    storageBucket: "split-bill-e096b.firebasestorage.app",
    messagingSenderId: "1092237693296",
    appId: "1:1092237693296:web:614eae7dac9b1f59a2bfb5",
    measurementId: "G-H8H4RBJW8G"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;

  // ── STATE ──
  window._state = { currentSession: null, splitType: 'equal' };

  // ── UTILS ──
  window.fmt = (n) => 'Rp ' + Math.round(n).toLocaleString('id-ID');
  window.toast = (msg) => {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  // ── MODAL ──
  window.openModal = (id) => document.getElementById(id).classList.add('open');
  window.closeModal = (id) => document.getElementById(id).classList.remove('open');
  window.closeModalOutside = (e, id) => { if (e.target.id === id) closeModal(id); };

  // ── MEMBER INPUTS ──
  window.addMemberInput = () => {
    const c = document.getElementById('member-inputs');
    const idx = c.querySelectorAll('.member-input-row').length + 1;
    const row = document.createElement('div');
    row.className = 'member-input-row';
    row.innerHTML = `
      <input type="text" placeholder="Nama orang ${idx}" class="member-name-input" />
      <button class="remove-member" onclick="this.parentElement.remove()">×</button>`;
    c.appendChild(row);
  };

  // ── CREATE SESSION ──
  window.createSession = async () => {
    const name = document.getElementById('new-session-name').value.trim();
    const inputs = document.querySelectorAll('.member-name-input');
    const members = [...inputs].map(i => i.value.trim()).filter(Boolean);
    if (!name) return toast('Nama sesi wajib diisi');
    if (members.length < 2) return toast('Minimal 2 orang');

    try {
      const ref = await addDoc(collection(db, 'sessions'), {
        name, members, createdAt: serverTimestamp()
      });
      toast('Sesi dibuat ✓');
      closeModal('modal-new-session');
      document.getElementById('new-session-name').value = '';
      document.querySelectorAll('.member-name-input').forEach((el, i) => { if (i > 1) el.parentElement.remove(); else el.value = ''; });
      openSession(ref.id, name, members);
    } catch(e) { toast('Gagal: ' + e.message); }
  };

  // ── LOAD SESSIONS ──
  const loadSessions = () => {
    const q = query(collection(db, 'sessions'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snap) => {
      const el = document.getElementById('session-list');
      if (snap.empty) {
        el.innerHTML = `<div class="empty-state"><div class="emoji">🧾</div>Belum ada sesi.<br>Buat sesi baru untuk mulai split bill.</div>`;
        return;
      }
      el.innerHTML = '';
      snap.forEach(d => {
        const s = d.data();
        const card = document.createElement('div');
        card.className = 'session-card';
        card.innerHTML = `
          <div class="session-card-name">${s.name}</div>
          <div class="session-card-meta">
            <span>👥 ${s.members?.length || 0} orang</span>
            <span>${s.createdAt?.toDate ? s.createdAt.toDate().toLocaleDateString('id-ID') : '—'}</span>
          </div>`;
        card.onclick = () => openSession(d.id, s.name, s.members);
        el.appendChild(card);
      });
    });
  };

  // ── OPEN SESSION ──
  window.openSession = async (id, name, members) => {
    window._state.currentSession = { id, name, members };
    document.getElementById('detail-title').textContent = name;
    document.getElementById('detail-subtitle').textContent = members.join(', ');
    document.getElementById('detail-members').innerHTML = members.map(m => `<span class="member-chip">${m}</span>`).join('');
    showView('view-detail');
    await loadExpenses(id);
  };

  // ── LOAD EXPENSES ──
  window.loadExpenses = async (sessionId) => {
    const q = query(collection(db, 'sessions', sessionId, 'expenses'), orderBy('createdAt', 'desc'));
    onSnapshot(q, (snap) => {
      const expenses = [];
      snap.forEach(d => expenses.push({ id: d.id, ...d.data() }));
      renderExpenses(expenses);
      renderResult(expenses);
    });
  };

  // ── RENDER EXPENSES ──
  window.renderExpenses = (expenses) => {
    const el = document.getElementById('expense-list');
    if (!expenses.length) {
      el.innerHTML = `<div class="empty-state"><div class="emoji">💸</div>Belum ada pengeluaran.<br>Tambahkan pengeluaran pertama.</div>`;
      return;
    }
    el.innerHTML = expenses.map(e => `
      <div class="expense-item">
        <div class="expense-header">
          <div>
            <div class="expense-desc">${e.description}</div>
            <div class="expense-meta">Dibayar ${e.payer} · ${e.splitType === 'equal' ? 'Rata' : 'Custom'}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="expense-amount">${fmt(e.amount)}</div>
            <button class="expense-delete" onclick="deleteExpense('${e.id}')">🗑</button>
          </div>
        </div>
        <div class="expense-participants">
          ${e.splits.map(s => `<span class="participant-chip">${s.member}${e.splitType==='custom'?' '+fmt(s.amount):''}</span>`).join('')}
        </div>
      </div>`).join('');
  };

  // ── RENDER RESULT ──
  window.renderResult = (expenses) => {
    const { members } = window._state.currentSession;
    const total = expenses.reduce((s, e) => s + e.amount, 0);
    document.getElementById('detail-total').textContent = fmt(total);
    document.getElementById('detail-per-orang').textContent = members.length ? fmt(total / members.length) + ' per orang (equal)' : '';

    // net balance
    const paid = {}, owed = {};
    members.forEach(m => { paid[m] = 0; owed[m] = 0; });
    expenses.forEach(e => {
      paid[e.payer] = (paid[e.payer] || 0) + e.amount;
      e.splits.forEach(s => { owed[s.member] = (owed[s.member] || 0) + s.amount; });
    });

    const net = {};
    members.forEach(m => net[m] = (paid[m] || 0) - (owed[m] || 0));

    // render balances
    document.getElementById('balance-list').innerHTML = members.map(m => {
      const n = net[m] || 0;
      const cls = n > 0 ? 'positive' : n < 0 ? 'negative' : 'zero';
      const label = n > 0 ? `+${fmt(n)} (dibayar lebih)` : n < 0 ? `-${fmt(Math.abs(n))} (kurang)` : 'Lunas ✓';
      return `<div class="balance-card">
        <div>
          <div class="balance-name">${m}</div>
          <div class="balance-paid">Bayar ${fmt(paid[m]||0)} · Harusnya ${fmt(owed[m]||0)}</div>
        </div>
        <div class="balance-net ${cls}">${label}</div>
      </div>`;
    }).join('');

    // simplify debt
    const transfers = simplifyDebt(net);
    const tEl = document.getElementById('transfer-list');
    if (!transfers.length) {
      tEl.innerHTML = `<div class="transfer-card" style="text-align:center;color:var(--accent);">🎉 Semua sudah lunas!</div>`;
    } else {
      tEl.innerHTML = transfers.map(t => `
        <div class="transfer-card">
          <div class="transfer-text"><strong>${t.from}</strong> <span class="transfer-arrow">→</span> <strong>${t.to}</strong></div>
          <div class="transfer-amount">${fmt(t.amount)}</div>
        </div>`).join('');
    }
  };

  // ── SIMPLIFY DEBT ──
  window.simplifyDebt = (net) => {
    const creditors = [], debtors = [];
    Object.entries(net).forEach(([m, n]) => {
      if (n > 0.5) creditors.push({ m, n });
      else if (n < -0.5) debtors.push({ m, n: -n });
    });
    creditors.sort((a,b) => b.n - a.n);
    debtors.sort((a,b) => b.n - a.n);

    const transfers = [];
    let i = 0, j = 0;
    while (i < creditors.length && j < debtors.length) {
      const amt = Math.min(creditors[i].n, debtors[j].n);
      if (amt > 0.5) transfers.push({ from: debtors[j].m, to: creditors[i].m, amount: amt });
      creditors[i].n -= amt;
      debtors[j].n -= amt;
      if (creditors[i].n < 0.5) i++;
      if (debtors[j].n < 0.5) j++;
    }
    return transfers;
  };

  // ── SPLIT TYPE ──
  window.setSplitType = (type) => {
    window._state.splitType = type;
    document.getElementById('toggle-equal').classList.toggle('active', type === 'equal');
    document.getElementById('toggle-custom').classList.toggle('active', type === 'custom');
    document.querySelectorAll('.member-check-item').forEach(el => {
      el.classList.toggle('custom', type === 'custom');
    });
    if (type === 'equal') recalcCustomWarning();
  };

  // ── OPEN ADD EXPENSE MODAL ──
  window.openModal = (id) => {
    if (id === 'modal-add-expense') {
      const { members } = window._state.currentSession;
      const payer = document.getElementById('exp-payer');
      payer.innerHTML = members.map(m => `<option value="${m}">${m}</option>`).join('');
      const list = document.getElementById('exp-participants');
      list.innerHTML = members.map(m => `
        <div class="member-check-item selected" data-member="${m}" onclick="toggleParticipant(this)">
          <div class="check">✓</div>
          <div class="name">${m}</div>
          <input type="number" class="custom-amount" placeholder="0" inputmode="numeric"
            onclick="event.stopPropagation()" oninput="recalcCustomWarning()" />
        </div>`).join('');
      window._state.splitType = 'equal';
      document.getElementById('toggle-equal').classList.add('active');
      document.getElementById('toggle-custom').classList.remove('active');
    }
    document.getElementById(id).classList.add('open');
  };

  window.toggleParticipant = (el) => {
    el.classList.toggle('selected');
    recalcCustomWarning();
  };

  window.recalcCustomWarning = () => {
    if (window._state.splitType !== 'custom') {
      document.getElementById('custom-total-warning').style.display = 'none';
      return;
    }
    const total = parseFloat(document.getElementById('exp-amount').value) || 0;
    const sum = [...document.querySelectorAll('.member-check-item.selected .custom-amount')]
      .reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
    const w = document.getElementById('custom-total-warning');
    if (total && Math.abs(sum - total) > 1) {
      w.style.display = 'block';
      w.textContent = `Total custom ${fmt(sum)} ≠ total bayar ${fmt(total)} (selisih ${fmt(Math.abs(sum-total))})`;
    } else {
      w.style.display = 'none';
    }
  };

  // ── ADD EXPENSE ──
  window.addExpense = async () => {
    const desc = document.getElementById('exp-desc').value.trim();
    const amount = parseFloat(document.getElementById('exp-amount').value);
    const payer = document.getElementById('exp-payer').value;
    const { id: sessionId, members } = window._state.currentSession;
    const type = window._state.splitType;

    if (!desc) return toast('Deskripsi wajib diisi');
    if (!amount || amount <= 0) return toast('Jumlah tidak valid');

    const selected = [...document.querySelectorAll('.member-check-item.selected')].map(el => el.dataset.member);
    if (!selected.length) return toast('Pilih minimal 1 peserta');

    let splits;
    if (type === 'equal') {
      const share = amount / selected.length;
      splits = selected.map(m => ({ member: m, amount: share }));
    } else {
      splits = [...document.querySelectorAll('.member-check-item.selected')].map(el => ({
        member: el.dataset.member,
        amount: parseFloat(el.querySelector('.custom-amount').value) || 0
      }));
      const sum = splits.reduce((s, x) => s + x.amount, 0);
      if (Math.abs(sum - amount) > 1) return toast(`Total custom (${fmt(sum)}) ≠ total bayar`);
    }

    try {
      await addDoc(collection(db, 'sessions', sessionId, 'expenses'), {
        description: desc, amount, payer, splits, splitType: type,
        createdAt: serverTimestamp()
      });
      toast('Pengeluaran disimpan ✓');
      closeModal('modal-add-expense');
      document.getElementById('exp-desc').value = '';
      document.getElementById('exp-amount').value = '';
    } catch(e) { toast('Gagal: ' + e.message); }
  };

  // ── DELETE EXPENSE ──
  window.deleteExpense = async (expId) => {
    if (!confirm('Hapus pengeluaran ini?')) return;
    const { id: sessionId } = window._state.currentSession;
    await deleteDoc(doc(db, 'sessions', sessionId, 'expenses', expId));
    toast('Dihapus ✓');
  };

  // ── VIEW / NAV ──
  window.showView = (id) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  };
  window.goHome = () => {
    window._state.currentSession = null;
    showView('view-home');
  };

  // ── TABS ──
  window.switchTab = (id) => {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const contents = document.querySelectorAll('.tab-content');
      const tabs = document.querySelectorAll('.tab');
      tabs.forEach(tb => tb.classList.remove('active'));
      contents.forEach(c => c.classList.remove('active'));
    });
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    tabs.forEach(t => t.classList.remove('active'));
    contents.forEach(c => c.classList.remove('active'));
    const idx = ['tab-hasil', 'tab-pengeluaran'].indexOf(id);
    tabs[idx]?.classList.add('active');
    document.getElementById(id)?.classList.add('active');
  };

  // ── INIT ──
  loadSessions();

  // SW Register
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
